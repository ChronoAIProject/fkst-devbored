<!doctype html><html><head><meta charset="utf-8"><style>
@font-face{font-family:'Space Grotesk';src:url('../../demo/fonts/space-grotesk-latin-700.woff2') format('woff2');font-weight:700}
@font-face{font-family:'Inter';src:url('../../demo/fonts/inter-latin.woff2') format('woff2')}
:root{--bg:oklch(16% .011 250);--ink:oklch(93% .006 250);--dim:oklch(72% .01 250);--faint:oklch(56% .012 250);--line:oklch(30% .012 250);--amber:oklch(78% .12 75);--green:oklch(72% .14 155)}
*{margin:0;box-sizing:border-box}
body{width:1280px;height:400px;background:var(--bg);font-family:Inter,system-ui;color:var(--ink);position:relative;overflow:hidden}
.art{position:absolute;inset:0}
.txt{position:absolute;left:84px;top:50%;transform:translateY(-50%);max-width:520px}
.txt h1{font-family:'Space Grotesk';font-size:56px;letter-spacing:-.02em;line-height:1.02}
.txt h1 span{color:var(--amber)}
.txt p{margin-top:14px;font-size:16.5px;color:var(--dim);line-height:1.5}
</style></head><body>
<svg class="art" viewBox="0 0 1280 400" fill="none">
  <!-- the loop: one continuous path sweeping the right side -->
  <ellipse cx="920" cy="200" rx="260" ry="150" stroke="oklch(30% .012 250)" stroke-width="1.5"/>
  <ellipse cx="920" cy="200" rx="260" ry="150" stroke="oklch(78% .12 75)" stroke-width="1.5"
           stroke-dasharray="500 1132" stroke-linecap="round" transform="rotate(-28 920 200)"/>
  <!-- tokens already traveling the loop -->
  <circle cx="920" cy="50"  r="4" fill="oklch(46% .012 250)"/>
  <circle cx="695" cy="130" r="4" fill="oklch(46% .012 250)"/>
  <circle cx="920" cy="350" r="4" fill="oklch(46% .012 250)"/>
  <!-- the token at the gate -->
  <circle cx="1180" cy="200" r="11" fill="oklch(78% .12 75)"/>
  <!-- council: five seats in a semicircle facing the token -->
  <g stroke-width="1.5">
    <circle cx="1101" cy="118" r="8" stroke="oklch(72% .01 250)"/>
    <circle cx="1064" cy="162" r="8" stroke="oklch(72% .14 155)"/>
    <circle cx="1050" cy="200" r="8" stroke="oklch(72% .01 250)"/>
    <circle cx="1064" cy="238" r="8" stroke="oklch(72% .01 250)"/>
    <circle cx="1101" cy="282" r="8" stroke="oklch(72% .01 250)" stroke-dasharray="3 3"/>
  </g>
  <!-- deliberation hairlines seat->token -->
  <g stroke="oklch(36% .012 250)" stroke-width="1">
    <path d="M1108 124 L1170 193"/><path d="M1071 167 L1168 197"/>
    <path d="M1058 200 L1168 200"/><path d="M1071 233 L1168 203"/>
    <path d="M1108 276 L1170 207"/>
  </g>
</svg>
<div class="txt">
  <h1>FKST <span>Devbored</span></h1>
  <p>The loop does the work. The council decides. A lean harness for Codex dev loops — GitHub-durable, human-auditable.</p>
</div>
</body></html>
